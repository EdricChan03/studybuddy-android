syntax = "proto3";

package com.edricchan.studybuddy.features.tasks.proto;

import "com/edricchan/studybuddy/features/tasks/domain/proto/tasks_fields.proto";

option java_multiple_files = true;

/* The currently set filters to be used for the list of tasks to be displayed. */
message TasksFilterOptions {
  /* List of task fields to sort by. */
  repeated TaskSortEntry order_by_fields = 1;
  /* Whether to include completed tasks. */
  bool include_completed = 2;
  /* Whether to include archived tasks. */
  bool include_archived = 3;
}
