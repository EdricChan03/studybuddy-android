syntax = "proto3";

package com.edricchan.studybuddy.features.tasks.proto;

import "google/protobuf/any.proto";
import "com/edricchan/studybuddy/data/common/proto/sort_direction.proto";

option java_multiple_files = true;

enum TaskField {
  /* The task's title field. */
  Task_Title = 0;
  /* The task's description field. */
  Task_Description = 1;
  /* The task's completion field. (Use CompletedDate instead) */
  Task_IsCompleted = 2 [deprecated = true];
  /* The task's archived field. (Use ArchivedDate instead) */
  Task_IsArchived = 3 [deprecated = true];
  /** The task's priority field. */
  Task_Priority = 4;
  /** The task's labels field. */
  Task_Labels = 5;
  /** The task's assigned project field. */
  Task_Project = 6;

  // Date fields
  /* The task's due-date field. */
  Task_DueDate = 100;
  /* The task's created date field. */
  Task_CreatedDate = 101;
  /* The task's completion date field. */
  Task_CompletedDate = 102;
  /* The task's archived date field. */
  Task_ArchivedDate = 103;
  /* The task's deleted date field. */
  Task_DeletedDate = 104;

  // Note: LastModifiedDate was originally not checked in, so the constants are already released;
  // this would've been after CreatedDate otherwise

  /* The task's last modified date field. */
  Task_LastModifiedDate = 110;
}

/* Specifies how a task field should be sorted. */
message TaskSortEntry {
  /* The task field. */
  TaskField field = 1;
  /* The direction to sort the task field by. */
  com.edricchan.studybuddy.data.common.proto.SortDirection direction = 2;
}

/* Class which emulates a key-value data structure. */
message TaskFieldEntry {
  /** The entry's key. */
  TaskField key = 1;
  /** The entry's value. */
  google.protobuf.Any value = 2;
}
